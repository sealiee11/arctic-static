<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Snowflake with a small open padlock at its center, on a transparent background</title>
  <desc>A six-armed snowflake drawn in thick blue strokes with a small unlocked padlock forming the hub at its center, its shackle sprung open with one leg lifted free of the body. The background is transparent and the keyhole is cut through the lock body.</desc>
  <defs>
    <mask id="keyhole">
      <rect x="181" y="193" width="38" height="33" rx="4.5" fill="#fff"/>
      <circle cx="200" cy="205" r="4.5" fill="#000"/>
      <path d="M197.5 207 L196.3 217 L203.7 217 L202.5 207 Z" fill="#000"/>
    </mask>
    <g id="arm">
      <path d="M200 161 L200 34" stroke-width="6.5"/>
      <path d="M200 116 L176 92 M200 116 L224 92" stroke-width="5.5"/>
      <path d="M200 82 L182 64 M200 82 L218 64" stroke-width="5.5"/>
      <path d="M200 50 L190 40 M200 50 L210 40" stroke-width="4.5"/>
    </g>
    <g id="minor">
      <path d="M200 166 L200 112" stroke-width="4.5"/>
      <path d="M200 126 L188 114 M200 126 L212 114" stroke-width="4"/>
      <circle cx="200" cy="106" r="4" fill="#185FA5" stroke="none"/>
      <path d="M200 69 L206 76 L200 83 L194 76 Z" fill="#378ADD" stroke="none"/>
      <circle cx="200" cy="46" r="3.2" fill="#85B7EB" stroke="none"/>
    </g>
  </defs>

  <g stroke="#185FA5" stroke-linecap="round" fill="none">
    <use href="#arm"/>
    <use href="#arm" transform="rotate(60 200 200)"/>
    <use href="#arm" transform="rotate(120 200 200)"/>
    <use href="#arm" transform="rotate(180 200 200)"/>
    <use href="#arm" transform="rotate(240 200 200)"/>
    <use href="#arm" transform="rotate(300 200 200)"/>
  </g>

  <g stroke="#378ADD" stroke-linecap="round" fill="none">
    <use href="#minor" transform="rotate(30 200 200)"/>
    <use href="#minor" transform="rotate(90 200 200)"/>
    <use href="#minor" transform="rotate(150 200 200)"/>
    <use href="#minor" transform="rotate(210 200 200)"/>
    <use href="#minor" transform="rotate(270 200 200)"/>
    <use href="#minor" transform="rotate(330 200 200)"/>
  </g>

  <path d="M200 161 L233.8 180.5 L233.8 219.5 L200 239 L166.2 219.5 L166.2 180.5 Z" fill="none" stroke="#378ADD" stroke-width="3"/>

  <g transform="translate(200 200) scale(0.88) translate(-200 -200)">
    <path d="M191 195 L191 185 A9 9 0 0 1 209 185" fill="none" stroke="#185FA5" stroke-width="5" stroke-linecap="round"/>
    <rect x="181" y="193" width="38" height="33" rx="4.5" fill="#185FA5" mask="url(#keyhole)"/>
  </g>
</svg>
